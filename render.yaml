services:
  - type: web
    name: freellmapi
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server/dist/index.js
    healthCheckPath: /v1/models
    envVars:
      - key: ENCRYPTION_KEY
        sync: false  # Must be 64 hex chars (32 bytes). Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production
